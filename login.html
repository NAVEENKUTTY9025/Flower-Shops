<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Sign in to Bloom & Petal – Your floral journey awaits">
    <title>Sign in · Bloom & Petal</title>
    <link rel="icon" type="image/jpeg" href="/images/flower logo.jpg" />
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts: Inter + Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --jet-black: #000000;
            --pure-white: #FFFFFF;
            --blush-pink: #f28b9c;
            --sage-green: #8aa57c;
            --text-main: #1a1a1a;
            --text-heading: #000000;
            --card-bg: #FFFFFF;
            --border-light: #f0e2e6;
            --navbar-bg: rgba(0, 0, 0, 0.92);
            --bg-primary: #FFFFFF;
            --bg-secondary: #FEF8F9;
            --text-muted: #4a4a4a;
            --text-light: #6b7280;
            --heading-font: 'Playfair Display', serif;
            --body-font: 'Inter', sans-serif;
            
            /* Form specific - fresh & clean */
            --label-color: #2c2c2c;
            --input-text: #1f1f1f;
            --input-placeholder: #9ca3af;
            --icon-color: #f28b9c;
            --checkbox-label: #1f1f1f;
            --separator-text: #6c757d;
            --forgot-link: #8aa57c;
            --intro-text: #4b5563;
            --input-bg: #FFFFFF;
            --input-border: #e5e7eb;
            --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15);
            --divider-bg: #f3f4f6;
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --text-main: #F0E8EC;
            --text-heading: #FFFFFF;
            --card-bg: #1F1A1C;
            --border-light: #5A4A52;
            
            /* Form specific - dark mode rich */
            --label-color: #F8B0C8;
            --input-text: #F0E8EC;
            --input-placeholder: #A09098;
            --icon-color: #F8B0C8;
            --checkbox-label: #F0E8EC;
            --separator-text: #B0A0A8;
            --forgot-link: #F8B0C8;
            --intro-text: #D0C0C8;
            --input-bg: #2A2024;
            --input-border: #5A4A52;
            --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
            --divider-bg: #2e2528;
        }

        body {
            font-family: var(--body-font);
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 20% 30%, rgba(242, 139, 156, 0.08) 0%, transparent 50%);
            padding: 1.5rem;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--heading-font);
            color: var(--text-heading);
            font-weight: 700;
            line-height: 1.2;
        }

        /* Theme & RTL toggles (consistent corner) */
        .toggle-corner {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            display: flex;
            gap: 0.7rem;
            z-index: 1100;
        }

        .control-bubble {
            width: 44px;
            height: 44px;
            background-color: var(--card-bg);
            border: 2px solid var(--blush-pink);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blush-pink);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(2px);
        }

        .control-bubble:hover {
            background-color: var(--blush-pink);
            color: var(--jet-black);
            border-color: var(--sage-green);
            transform: scale(1.03);
        }

        /* Main card – spacious, airy like reference image */
        .auth-card {
            background-color: var(--card-bg);
            border-radius: 2rem;
            border: 1px solid var(--blush-pink);
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 480px;
            padding: 1.8rem 2rem 2rem;
            transition: all 0.25s ease;
            backdrop-filter: blur(0px);
        }

        /* Logo strip (matches index & elegant) */
        .logo-strip {
            background: linear-gradient(115deg, #000000 0%, #1e1e1e 100%);
            border-radius: 2rem 2rem 1.5rem 1.5rem;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.6rem;
            border: 2px solid var(--blush-pink);
            box-shadow: 0 12px 18px -12px rgba(0,0,0,0.3);
        }

        .logo-uniform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-decoration: none;
            color: inherit;
        }

        .logo-icon {
            width: 2.9rem;
            height: 2.9rem;
            background: linear-gradient(135deg, var(--blush-pink) 0%, var(--sage-green) 100%);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }

        .logo-icon i {
            color: white;
            font-size: 1.6rem;
        }

        .logo-text-block {
            text-align: left;
        }

        .logo-text {
            font-size: 1.55rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.01em;
            font-family: var(--heading-font);
        }

        .logo-text span {
            color: var(--blush-pink);
        }

        .tagline {
            font-size: 0.65rem;
            color: #cfcfcf;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 0.1rem;
            display: block;
        }

        /* Welcome headline exactly matching image vibe */
        .welcome-section {
            text-align: left;
            margin-bottom: 1.6rem;
        }
        .welcome-section h2 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.2rem;
            color: var(--text-heading);
        }
        .welcome-section p {
            font-size: 0.85rem;
            color: var(--intro-text);
            font-weight: 500;
        }

        /* Form groups – modern clean */
        .input-group {
            margin-bottom: 1.1rem;
        }

        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.45rem;
            color: var(--label-color);
        }

        .input-field-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--icon-color);
            font-size: 1rem;
            z-index: 2;
            pointer-events: none;
        }

        .input-field {
            width: 100%;
            background-color: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 56px;
            padding: 0.8rem 1rem 0.8rem 2.6rem;
            font-family: var(--body-font);
            color: var(--input-text);
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-field::placeholder {
            color: var(--input-placeholder);
            font-weight: 400;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--blush-pink);
            box-shadow: 0 0 0 3px rgba(242, 139, 156, 0.25);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-muted);
            opacity: 0.6;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .password-toggle:hover { 
            color: var(--blush-pink); 
            opacity: 1; 
        }

        /* Checkbox & forgot row (exactly like image: left checkbox, right link) */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.6rem 0 1.2rem;
        }
        .checkbox-custom {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .checkbox-custom input {
            accent-color: var(--blush-pink);
            width: 1rem;
            height: 1rem;
            margin: 0;
            cursor: pointer;
        }
        .checkbox-custom label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--checkbox-label);
            cursor: pointer;
            user-select: none;
        }
        .forgot-link {
            color: var(--forgot-link);
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
            border-bottom: 1px dotted transparent;
        }
        .forgot-link:hover {
            color: var(--blush-pink);
            border-bottom-color: var(--blush-pink);
        }

        /* Primary CTA button */
        .btn-primary {
            background-color: var(--blush-pink);
            color: #000000;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.25s ease;
            box-shadow: 0 8px 18px -6px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            width: 100%;
            letter-spacing: 0.01em;
        }

        .btn-primary:hover {
            background-color: var(--sage-green);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 12px 22px -12px rgba(0, 0, 0, 0.3);
        }

        /* Divider with "or continue with" (matches reference) */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.4rem 0 1rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--input-border);
        }
        .divider span {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--separator-text);
            margin: 0 0.8rem;
        }

        /* Social buttons (google + apple) exactly as image */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }
        .social-btn {
            background: transparent;
            border: 1.5px solid var(--input-border);
            border-radius: 60px;
            padding: 0.7rem 0.4rem;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-main);
            font-family: var(--body-font);
        }
        .social-btn i {
            font-size: 1.1rem;
            color: var(--blush-pink);
        }
        .social-btn:hover {
            background-color: var(--blush-pink);
            border-color: var(--blush-pink);
            color: #000;
            transform: translateY(-2px);
        }
        .social-btn:hover i {
            color: #000;
        }
        [data-theme="dark"] .social-btn:hover {
            background-color: var(--blush-pink);
            color: #000;
        }

        /* Sign up link (new user) */
        .signup-prompt {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--intro-text);
        }
        .signup-prompt a {
            color: var(--sage-green);
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            margin-left: 0.3rem;
        }
        .signup-prompt a:hover {
            color: var(--blush-pink);
            border-bottom-color: var(--blush-pink);
        }
        [data-theme="dark"] .signup-prompt a {
            color: var(--blush-pink);
        }
        [data-theme="dark"] .signup-prompt a:hover {
            color: var(--sage-green);
            border-bottom-color: var(--sage-green);
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1200;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            pointer-events: none;
        }
        .toast {
            background-color: var(--card-bg);
            color: var(--text-main);
            border-left: 6px solid var(--blush-pink);
            padding: 0.8rem 1.6rem;
            border-radius: 60px;
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.25);
            font-weight: 600;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            border: 1px solid var(--blush-pink);
            pointer-events: auto;
            animation: fadeSlideUp 0.25s ease;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RTL adjustments */
        [dir="rtl"] .input-icon {
            left: auto;
            right: 1rem;
        }
        [dir="rtl"] .input-field {
            padding-left: 1rem;
            padding-right: 2.6rem;
        }
        [dir="rtl"] .password-toggle {
            right: auto;
            left: 1rem;
        }

        @media (max-width: 540px) {
            body { padding: 0.8rem; }
            .auth-card { padding: 1.4rem 1.3rem 1.8rem; max-width: 100%; }
            .logo-text { font-size: 1.3rem; }
            .welcome-section h2 { font-size: 1.7rem; }
            .social-grid { gap: 0.7rem; }
            .social-btn { font-size: 0.75rem; padding: 0.6rem 0.2rem; }
            .toggle-corner { top: 0.7rem; right: 0.7rem; }
            .control-bubble { width: 38px; height: 38px; font-size: 1rem; }
        }
        
    </style>
</head>
<body>
    <!-- Theme + RTL controls (exactly like original but refined) -->
    <div class="toggle-corner">
        <button class="control-bubble" id="rtl-toggle" title="RTL / LTR">
            <i class="fas fa-language"></i>
        </button>
        <button class="control-bubble" id="theme-toggle" title="Dark / Light">
            <i class="fas fa-circle-half-stroke" id="theme-icon"></i>
        </button>
    </div>

    <!-- Main card with fresh layout matching image "Sign in to your account" design -->
    <div class="auth-card">
        <!-- Logo (bloom & petal consistent) -->
        <div class="logo-strip">
            <a href="index.html" class="logo-uniform">
                <div class="logo-icon">
                    <i class="fas fa-feather-alt"></i>
                </div>
                <div class="logo-text-block">
                    <div class="logo-text">Bloom<span> & Petal</span></div>
                    <span class="tagline">ARTFUL FLORISTRY</span>
                </div>
            </a>
        </div>

        <!-- "Sign in to your account" header exactly like image -->
        <div class="welcome-section">
            <h2>Sign in</h2>
            <p>to your account</p>
        </div>

        <!-- Social sign in row: Google + Apple (as per image: Sign In With Google, Sign In With Apple) -->
        <div class="social-grid">
            <button class="social-btn" id="google-signin">
                <i class="fab fa-google"></i> Sign In With Google
            </button>
            <button class="social-btn" id="apple-signin">
                <i class="fab fa-apple"></i> Sign In With Apple
            </button>
        </div>

        <!-- Divider "Or continue with" -->
        <div class="divider">
            <span>Or continue with</span>
        </div>

        <!-- Email & Password Form -->
        <form id="loginForm" onsubmit="return handleLoginSubmit(event)">
            <div class="input-group">
                <label class="input-label" for="email">Email address</label>
                <div class="input-field-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" class="input-field" placeholder="your@email.com" autocomplete="email" required>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label" for="password">Password</label>
                <div class="input-field-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="input-field" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="password-toggle" onclick="togglePasswordField('password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Row: remember me + forgot password (exactly image style) -->
            <div class="options-row">
                <label class="checkbox-custom">
                    <input type="checkbox" id="rememberMe"> 
                    <label for="rememberMe">Remember me</label>
                </label>
                <a href="contact.html" class="forgot-link">Forgot password?</a>
            </div>

            <!-- Continue button (primary) -->
            <button type="submit" class="btn-primary" id="continueBtn">
                <i class="fas fa-arrow-right-to-bracket"></i> Continue
            </button>
        </form>

        <!-- Sign up link: Don't have an account? Sign Up -->
        <div class="signup-prompt">
            Don't have an account? <a href="register.html">Sign Up</a>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // DOM elements
        const htmlRoot = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIconSpan = document.getElementById('theme-icon');
        const rtlToggleBtn = document.getElementById('rtl-toggle');
        
        // Theme initialization
        let savedTheme = localStorage.getItem('theme') || 'light';
        htmlRoot.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
        
        function updateThemeIcon(theme) {
            if (themeIconSpan) {
                themeIconSpan.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-circle-half-stroke';
            }
        }
        
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                const current = htmlRoot.getAttribute('data-theme');
                const nextTheme = current === 'light' ? 'dark' : 'light';
                htmlRoot.setAttribute('data-theme', nextTheme);
                localStorage.setItem('theme', nextTheme);
                updateThemeIcon(nextTheme);
            });
        }
        
        // RTL toggle
        if (rtlToggleBtn) {
            rtlToggleBtn.addEventListener('click', () => {
                const currentDir = htmlRoot.getAttribute('dir') || 'ltr';
                const newDir = currentDir === 'ltr' ? 'rtl' : 'ltr';
                htmlRoot.setAttribute('dir', newDir);
            });
        }
        
        // Password visibility toggle (global function)
        window.togglePasswordField = function(inputId, btnElement) {
            const inputField = document.getElementById(inputId);
            if (!inputField) return;
            const icon = btnElement.querySelector('i');
            if (inputField.type === 'password') {
                inputField.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                inputField.type = 'password';
                icon.className = 'fas fa-eye';
            }
        };
        
        // Toast notification system (sleek)
        function showToast(message, isError = false) {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-circle-exclamation' : 'fa-seedling'}" style="margin-right: 8px;"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() => toast.remove(), 300);
            }, 3200);
        }
        
        // Helper to simulate async login (response handling as original but enhanced)
        async function performSignIn(email, password, remember) {
            // Basic validation (just for UX)
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (email && password && password.length >= 1) {
                        // accept any non-empty password for demo (smooth)
                        resolve({ success: true, message: 'Welcome back, flower lover 🌸' });
                    } else {
                        reject({ success: false, message: 'Please enter both email and password.' });
                    }
                }, 1000);
            });
        }
        
        // Login form submit handler
        window.handleLoginSubmit = async function(event) {
            event.preventDefault();
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const rememberCheck = document.getElementById('rememberMe');
            const submitBtn = document.getElementById('continueBtn');
            
            const email = emailInput ? emailInput.value.trim() : '';
            const password = passwordInput ? passwordInput.value : '';
            const remember = rememberCheck ? rememberCheck.checked : false;
            
            if (!email) {
                showToast('Please enter your email address', true);
                emailInput.focus();
                return false;
            }
            if (!password) {
                showToast('Please enter your password', true);
                passwordInput.focus();
                return false;
            }
            
            // UI loading state
            const originalBtnHTML = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Signing in...';
            submitBtn.disabled = true;
            
            try {
                const result = await performSignIn(email, password, remember);
                showToast(result.message);
                // store "remember me" flag in localStorage (optional)
                if (remember) {
                    localStorage.setItem('bp_remembered_email', email);
                } else {
                    localStorage.removeItem('bp_remembered_email');
                }
                // success redirect to userdash.html after short delay
                setTimeout(() => {
                    window.location.href = 'userdash.html';
                }, 1100);
            } catch (err) {
                showToast(err.message || 'Authentication failed. Try again.', true);
                submitBtn.innerHTML = originalBtnHTML;
                submitBtn.disabled = false;
            }
            return false;
        };
        
        // Social login simulation (Google / Apple) with same color theme response
        function handleSocialLogin(provider) {
            let msg = `Sign in with ${provider} — demo mode ✨`;
            showToast(msg);
            setTimeout(() => {
                window.location.href = 'userdash.html';
            }, 1000);
        }
        
        // Attach social buttons
        const googleBtn = document.getElementById('google-signin');
        const appleBtn = document.getElementById('apple-signin');
        if (googleBtn) {
            googleBtn.addEventListener('click', (e) => {
                e.preventDefault();
                handleSocialLogin('Google');
            });
        }
        if (appleBtn) {
            appleBtn.addEventListener('click', (e) => {
                e.preventDefault();
                handleSocialLogin('Apple');
            });
        }
        
        // Auto-fill remembered email (nice touch)
        const rememberedEmail = localStorage.getItem('bp_remembered_email');
        const emailField = document.getElementById('email');
        if (rememberedEmail && emailField) {
            emailField.value = rememberedEmail;
            const rememberCheckbox = document.getElementById('rememberMe');
            if (rememberCheckbox) rememberCheckbox.checked = true;
        }
        
        // Additional: Remove any stuck loading state if back navigation
        window.addEventListener('pageshow', function() {
            const btn = document.getElementById('continueBtn');
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Continue';
            }
        });
    </script>
